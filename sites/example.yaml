name: example-site
baseUrl: https://example.com
alerting: true

healthcheck:
  enabled: false              # set to true once selectors are validated
  intervalMinutes: 10
  timeoutSeconds: 30

lighthouse:
  enabled: false              # set to true once healthcheck is passing
  intervalMinutes: 360
  throttling: mobile          # mobile | desktop

pages:
  - path: /
    name: Home
    selectors:
      - "nav"                 # replace with site-specific selectors
      - "main"

  - path: /contact/
    name: Contact
    selectors:
      - "nav"
      - "form"

