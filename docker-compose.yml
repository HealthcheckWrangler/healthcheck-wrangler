services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: hcw-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: hcw
      POSTGRES_USER: hcw
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcw"]
      interval: 10s
      timeout: 5s
      retries: 5

  runner:
    image: ghcr.io/healthcheckwrangler/healthcheck-wrangler:latest
    container_name: hcw-runner
    restart: unless-stopped
    env_file: .env
    shm_size: '1gb'
    environment:
      DATABASE_URL: postgresql://hcw:${DB_PASSWORD}@timescaledb:5432/hcw
    volumes:
      - ./sites:/app/sites:ro
      - ./reports:/app/reports
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    image: ghcr.io/healthcheckwrangler/healthcheck-wrangler:latest
    container_name: hcw-dashboard
    restart: unless-stopped
    command: ["node", "--enable-source-maps", "dist/src/dashboard/server.js"]
    environment:
      RUNNER_API_URL: http://runner:8080
      DASHBOARD_PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      - runner

  # Optional: Cloudflare Tunnel for external access without port forwarding
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: hcw-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - dashboard

volumes:
  timescaledb-data:
