apiVersion: 1

providers:
  - name: ${HCW_PROJECT_NAME}
    orgId: 1
    folder: ${HCW_PROJECT_NAME}
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
