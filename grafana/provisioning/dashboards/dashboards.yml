apiVersion: 1

providers:
  - name: improntad-healthchecks
    orgId: 1
    folder: Improntad
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
